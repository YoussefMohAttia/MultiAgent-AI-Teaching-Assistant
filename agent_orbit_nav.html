<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agents – Squee Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:        #0b0f1a;
  --sidebar:   #0f1424;
  --card:      #151d2e;
  --card-alt:  #1a2236;
  --border:    rgba(255,255,255,.07);
  --border-md: rgba(255,255,255,.11);
  --text:      #e8eaf0;
  --muted:     rgba(255,255,255,.42);
  --muted2:    rgba(255,255,255,.22);
  --purple:    #7c5cfc;
  --purple-bg: rgba(124,92,252,.18);
  --purple-glow: rgba(124,92,252,.35);
  --teal:      #14b8a6;
  --teal-bg:   rgba(20,184,166,.18);
  --green:     #10b981;
  --green-bg:  rgba(16,185,129,.18);
  --orange:    #f97316;
  --orange-bg: rgba(249,115,22,.18);
  --pink:      #ec4899;
  --pink-bg:   rgba(236,72,153,.18);
  --blue:      #3b82f6;
  --blue-bg:   rgba(59,130,246,.18);
  --R: 210px;
  --node: 80px;
  --ring-dur: 60s;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  min-height:100vh;
  overflow:hidden;
}

/* ════════════════════════════ SIDEBAR ════════════════════════════ */
.sidebar{
  width:240px;min-width:240px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0;
  z-index:20;
}

.logo{
  display:flex;align-items:center;gap:10px;
  padding:20px 20px 20px;
  border-bottom:1px solid var(--border);
}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--purple-bg);
  border:1px solid rgba(124,92,252,.35);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:var(--purple);stroke-width:2}
.logo-text{font-weight:700;font-size:15px;color:var(--text)}

.nav{padding:16px 12px;flex:1;display:flex;flex-direction:column;gap:2px}

.nav-section{
  font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted2);
  padding:14px 8px 6px;
}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;
  font-size:13.5px;font-weight:500;color:var(--muted);
  cursor:pointer;text-decoration:none;
  transition:background .18s,color .18s;
}
.nav-item svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{
  background:rgba(124,92,252,.15);
  color:var(--purple);
  border:1px solid rgba(124,92,252,.2);
}
.nav-item.active svg{stroke:var(--purple)}

.sidebar-footer{
  padding:16px 12px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.avatar-sm{
  width:32px;height:32px;border-radius:50%;
  background:var(--purple);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:11px;color:var(--muted)}
.logout-btn{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);cursor:pointer;
  transition:background .18s,color .18s;
}
.logout-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
.logout-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* ════════════════════════════ MAIN ════════════════════════════ */
.main{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}

/* top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.topbar-left h1{font-size:26px;font-weight:700;color:var(--text);line-height:1.1}
.topbar-left p{font-size:13px;color:var(--muted);margin-top:3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  background:var(--card);border:1px solid var(--border-md);
  font-size:12.5px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:background .18s,color .18s;
}
.tb-btn:hover{background:var(--card-alt);color:var(--text)}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.avatar-lg{
  width:36px;height:36px;border-radius:50%;
  background:var(--purple);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;cursor:pointer;
  border:2px solid rgba(124,92,252,.4);
}

/* content area */
.content{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:20px;
}

/* subtle grid */
.content::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,92,252,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,92,252,.025) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

/* hint text */
.hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:12px;color:var(--muted2);letter-spacing:.05em;white-space:nowrap;
}

/* ════════════════════════════ ORBIT SCENE ════════════════════════════ */
.scene{
  position:relative;
  width:calc(var(--R)*2 + var(--node)*2 + 100px);
  height:calc(var(--R)*2 + var(--node)*2 + 100px);
  display:flex;align-items:center;justify-content:center;
}

/* static base ring */
.ring-base{
  position:absolute;
  width:calc(var(--R)*2);height:calc(var(--R)*2);
  border-radius:50%;
  border:1px solid var(--border-md);
}

/* spinning glow ring */
.ring-spin{
  position:absolute;
  width:calc(var(--R)*2);height:calc(var(--R)*2);
  border-radius:50%;
  animation:ring-rot var(--ring-dur) linear infinite;
  pointer-events:none;
}
@keyframes ring-rot{to{transform:rotate(360deg)}}
.ring-spin::before{
  content:'';position:absolute;inset:-2px;border-radius:50%;
  background:conic-gradient(
    rgba(124,92,252,0)   0%,
    rgba(124,92,252,.75) 14%,
    rgba(20,184,166,.65) 30%,
    rgba(59,130,246,.6)  46%,
    rgba(236,72,153,.55) 62%,
    rgba(249,115,22,.5)  76%,
    rgba(124,92,252,0)   84%
  );
  -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 3px),#000 100%);
  mask:radial-gradient(farthest-side,#0000 calc(100% - 3px),#000 100%);
}
/* comet dot */
.ring-spin::after{
  content:'';
  position:absolute;top:-5px;left:50%;width:10px;height:10px;margin-left:-5px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 12px 4px rgba(160,140,255,.9);
}

/* inner dashed ring */
.ring-inner{
  position:absolute;
  width:calc(var(--R)*2 - 52px);height:calc(var(--R)*2 - 52px);
  border-radius:50%;border:1px dashed rgba(255,255,255,.05);
}

/* ── nodes ── */
.node{
  position:absolute;top:50%;left:50%;
  width:var(--node);height:var(--node);
  margin:calc(var(--node)/-2);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
}

.disk{
  width:var(--node);height:var(--node);border-radius:16px;
  background:var(--card);
  border:1px solid var(--border-md);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),
             box-shadow .3s ease,border-color .3s,background .3s;
}
.disk-icon{
  width:40px;height:40px;border-radius:10px;
  background:var(--ic-bg);
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s ease;
}
.disk-icon svg{width:22px;height:22px;fill:none;display:block}

.node:hover .disk{
  transform:scale(1.14) translateY(-4px);
  background:var(--card-alt);
  border-color:var(--ic-color);
  box-shadow:0 0 20px var(--ic-glow), 0 12px 32px rgba(0,0,0,.5);
}
.node:hover .disk-icon{transform:scale(1.08)}

.label{
  margin-top:10px;font-size:11px;font-weight:600;letter-spacing:.04em;
  color:var(--muted);white-space:nowrap;text-align:center;
  transition:color .25s;
}
.node:hover .label{color:var(--text)}

/* tooltip */
.tip{
  position:absolute;bottom:calc(100% + 10px);
  left:50%;transform:translateX(-50%) translateY(5px);
  background:var(--card-alt);
  border:1px solid var(--border-md);
  border-radius:8px;padding:6px 12px;
  font-size:11.5px;color:var(--muted);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:50;
}
.node:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── centre orb ── */
.orb{
  position:absolute;width:82px;height:82px;border-radius:50%;z-index:30;
  display:flex;align-items:center;justify-content:center;
}
.orb-pings{position:absolute;inset:0;pointer-events:none}
.orb-ping{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(124,92,252,.35);
  animation:orb-ping 3.2s ease-out infinite;
}
.orb-ping:nth-child(2){animation-delay:1.07s}
.orb-ping:nth-child(3){animation-delay:2.14s}
@keyframes orb-ping{
  0%{transform:scale(1);opacity:.5}
  100%{transform:scale(2.8);opacity:0}
}
.orb-core{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #a78bfa 0%, #7c5cfc 30%, #4f46e5 60%, #1e1b4b 100%);
  display:flex;align-items:center;justify-content:center;
  animation:orb-breathe 4s ease-in-out infinite;
  overflow:hidden;
}
.orb-core::after{
  content:'';position:absolute;top:-25%;left:-18%;
  width:50%;height:46%;border-radius:50%;
  background:rgba(255,255,255,.2);filter:blur(8px);
}
@keyframes orb-breathe{
  0%,100%{box-shadow:0 0 24px rgba(124,92,252,.5),0 0 64px rgba(124,92,252,.18)}
  50%{box-shadow:0 0 38px rgba(124,92,252,.7),0 0 90px rgba(124,92,252,.28)}
}
.orb-core svg{width:26px;height:26px;position:relative;z-index:1;fill:rgba(255,255,255,.92)}

/* ripple */
.ripple{
  position:fixed;border-radius:50%;pointer-events:none;
  animation:rout .6s ease-out forwards;z-index:999;
}
@keyframes rout{from{transform:scale(0);opacity:.45}to{transform:scale(5);opacity:0}}
</style>
</head>

      <!-- nodes injected by JS -->

<script>
const agents = [
  {
    id:'essay-grader', label:'Essay Grader',
    tip:'Grade & give written feedback',
    color:'var(--orange)', bg:'var(--orange-bg)', glow:'rgba(249,115,22,.3)',
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>`
  },
  {
    id:'evaluator', label:'Evaluator',
    tip:'Assess student performance',
    color:'var(--purple)', bg:'var(--purple-bg)', glow:'rgba(124,92,252,.3)',
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="#7c5cfc" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <polyline points="16 11 18 13 22 9"/>
    </svg>`
  },
  {
    id:'summarizer', label:'Summarizer',
    tip:'Condense documents instantly',
    color:'var(--teal)', bg:'var(--teal-bg)', glow:'rgba(20,184,166,.3)',
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="7" y1="8"  x2="17" y2="8"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
      <line x1="7" y1="16" x2="13" y2="16"/>
    </svg>`
  },
  {
    id:'tutor', label:'AI Tutor Chat',
    tip:'Interactive learning assistant',
    color:'var(--blue)', bg:'var(--blue-bg)', glow:'rgba(59,130,246,.3)',
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>`
  },
  {
    id:'quiz', label:'Quiz Generator',
    tip:'Auto-generate quizzes & tests',
    color:'var(--pink)', bg:'var(--pink-bg)', glow:'rgba(236,72,153,.3)',
    svg:`<svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8"  y1="2" x2="8"  y2="6"/>
      <line x1="3"  y1="10" x2="21" y2="10"/>
      <polyline points="8 14 10 16 14 12"/>
    </svg>`
  }
];

const scene = document.getElementById('scene');
const n = agents.length;
const R = 210;

agents.forEach((a, i) => {
  const deg = (i / n) * 360 - 90;
  const rad = deg * Math.PI / 180;
  const cx = Math.cos(rad) * R;
  const cy = Math.sin(rad) * R;

  const el = document.createElement('div');
  el.className = 'node';
  el.style.cssText = `
    transform:translate(${cx}px,${cy}px);
    --ic-color:${a.color};
    --ic-bg:${a.bg};
    --ic-glow:${a.glow};
  `;
  el.innerHTML = `
    <div class="disk">
      <div class="disk-icon">${a.svg}</div>
      <div class="tip">${a.tip}</div>
    </div>
    <div class="label">${a.label}</div>`;

  el.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'ripple';
    const s = 64;
    r.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px;background:${a.glow.replace('rgba','rgba').replace('.3)','1)')}`;
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),700);
    setTimeout(()=>{ window.location.href='#'+a.id; },340);
  });

  scene.insertBefore(el, scene.querySelector('.orb'));
});
</script>
</body>
</html>
