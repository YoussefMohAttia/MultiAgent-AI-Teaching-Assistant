services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: teaching_assistant_db
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teaching_assistant_db"]
      interval: 5s
      timeout: 5s
      retries: 20
  pgadmin:
    image: dpage/pgadmin4
    container_name: squee-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:12345@postgres:5432/teaching_assistant_db
      ESSAY_GRADER_MODEL_PATH: /models/fine_tuned_essaygrader
      PDF_UPLOAD_DIR: /app/uploaded_files
      CHROMA_PERSIST_DIR: /app/chroma_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - "./Ai Team/Main/final_essay_grader/fine_tuned_essaygrader:/models/fine_tuned_essaygrader:ro"
      - backend-uploads:/app/uploaded_files
      - backend-chroma:/app/chroma_db

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_TARGET: http://backend:8000
    command: sh -c "npm install --include=dev && ( [ -f ./node_modules/vite/bin/vite.js ] || npm install --save-dev vite ) && node ./node_modules/vite/bin/vite.js --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  db-data:
  backend-uploads:
  backend-chroma:
  frontend-node-modules: