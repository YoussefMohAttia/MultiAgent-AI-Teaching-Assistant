<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduAI</title>
    <style>
      .static-legal-footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        z-index: 9999;
        pointer-events: auto;
      }
      .static-legal-footer a {
        color: #ffffff;
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .static-legal-footer a:hover {
        color: rgba(255, 255, 255, 0.8);
      }
      [data-theme="light"] .static-legal-footer {
        color: rgba(15, 23, 42, 0.8);
      }
      [data-theme="light"] .static-legal-footer a {
        color: #1e293b;
      }
      [data-theme="light"] .static-legal-footer a:hover {
        color: #0f172a;
      }
    </style>
    <script>
      // Set theme before React renders to avoid flash
      document.documentElement.setAttribute(
        'data-theme',
        localStorage.getItem('theme') || 'dark'
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="static-legal-footer" class="static-legal-footer" aria-label="Legal">
      <a id="legal-link-privacy" href="/privacy">Privacy Policy</a>
      <span aria-hidden="true">•</span>
      <a id="legal-link-terms" href="/terms">Terms of Service</a>
    </div>
    <script>
      // Keep legal links synced with the selected language.
      (function () {
        const root = document.documentElement;
        const footer = document.getElementById('static-legal-footer');
        const privacyLink = document.getElementById('legal-link-privacy');
        const termsLink = document.getElementById('legal-link-terms');

        if (!footer || !privacyLink || !termsLink) return;

        const applyLegalCopy = () => {
          const lang = (root.getAttribute('lang') || localStorage.getItem('lang') || 'en').toLowerCase();
          const isArabic = lang === 'ar';

          privacyLink.textContent = isArabic ? 'سياسة الخصوصية' : 'Privacy Policy';
          termsLink.textContent = isArabic ? 'شروط الاستخدام' : 'Terms of Service';
          footer.setAttribute('aria-label', isArabic ? 'روابط قانونية' : 'Legal');
        };

        applyLegalCopy();

        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.type === 'attributes' && mutation.attributeName === 'lang') {
              applyLegalCopy();
              break;
            }
          }
        });

        observer.observe(root, { attributes: true, attributeFilter: ['lang'] });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
