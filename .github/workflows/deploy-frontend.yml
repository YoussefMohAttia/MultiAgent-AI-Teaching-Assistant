name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        docker login tastagingacr.azurecr.io \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          -t tastagingacr.azurecr.io/frontend:${{ github.sha }} \
          ./Frontend

    - name: Push Docker Image
      run: |
        docker push tastagingacr.azurecr.io/frontend:${{ github.sha }}

    - name: Deploy to Azure Container App
      run: |
        az containerapp update \
          --name ta-frontend-v4 \
          --resource-group ta-rg \
          --image tastagingacr.azurecr.io/frontend:${{ github.sha }}