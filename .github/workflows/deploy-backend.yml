name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        docker login tastagingacr.azurecr.io \
          -u ${{ secrets.ACR_USERNAME }} \
          -p ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t tastagingacr.azurecr.io/backend:${{ github.sha }} ./Backend

    - name: Push Docker Image
      run: |
        docker push tastagingacr.azurecr.io/backend:${{ github.sha }}

    - name: Update Container App
      run: |
        az containerapp update \
          --name ta-backend-v3 \
          --resource-group ta-rg \
          --image tastagingacr.azurecr.io/backend:${{ github.sha }}